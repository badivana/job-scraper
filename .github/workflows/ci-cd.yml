name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Docker images
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/jobfinder-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/jobfinder-backend
  WORKER_IMAGE: ghcr.io/${{ github.repository_owner }}/jobfinder-worker
  # Docker Registry
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.actor }}

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.WORKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.WORKER_IMAGE }}:buildcache,mode=max

      - name: Start test services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d db redis backend frontend
          # Wait for backend to be ready (simple retry)
          for i in {1..30}; do
            if docker exec $(docker compose -f docker-compose.yml -f docker-compose.test.yml ps -q backend) nc -z localhost 8000; then
              echo "Backend is ready"
              break
            fi
            sleep 1
          done
          # Wait for frontend to be ready
          for i in {1..30}; do
            if docker exec $(docker compose -f docker-compose.yml -f docker-compose.test.yml ps -q frontend) nc -z localhost 3000; then
              echo "Frontend is ready"
              break
            fi
            sleep 1
          done

      - name: Run backend health check
        run: |
          BACKEND_CONTAINER_ID=$(docker compose -f docker-compose.yml -f docker-compose.test.yml ps -q backend)
          docker exec $BACKEND_CONTAINER_ID curl -f http://localhost:8000/health || exit 1

      - name: Run frontend homepage check
        run: |
          FRONTEND_CONTAINER_ID=$(docker compose -f docker-compose.yml -f docker-compose.test.yml ps -q frontend)
          docker exec $FRONTEND_CONTAINER_ID curl -f http://localhost:3000 || exit 1

      - name: Stop test services
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml down

      - name: Deploy to staging
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Trigger deployment to staging (e.g., via webhook to Render/Railway)
          curl -X POST ${{ secrets.STAGING_DEPLOY_HOOK }} || echo "Deployment hook failed"

      - name: Run smoke tests against staging
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Wait for staging to be ready
          for i in {1..60}; do
            if curl -sfo /dev/null ${{ secrets.STAGING_URL }}; then
              echo "Staging is ready"
              break
            fi
            sleep 10
          done
          # Smoke test: check health endpoint
          curl -f https://${{ secrets.STAGING_URL }}/health || exit 1
          # Smoke test: check frontend
          curl -f https://${{ secrets.STAGING_URL }} || exit 1